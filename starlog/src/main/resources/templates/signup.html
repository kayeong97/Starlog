<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | Starlog</title>
    <link rel="stylesheet" href="/css/starlog.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  </head>
  <body>
    <main class="signup-page">
      <div class="orb huge"></div>
      <section class="signup-copy">
        <h1><span class="icon icon-spark"></span> Starlog</h1>
        <h2>내 마음 속 별을 꺼내<br />빛을 내는 시간</h2>
        <p>
          매일의 습관을 빛나는 성취의 별자리로 바꾸고, 나만의 은하계를
          기록하세요.
        </p>
      </section>
      <section class="auth-card">
        <h1>회원가입</h1>
        <p>당신의 우주적 여정을 오늘 시작하세요.</p>
        <p
          class="form-error"
          th:if="${errorMessage}"
          th:text="${errorMessage}"
        ></p>
        <form action="/signup" method="post" class="auth-form">
          <label
            >이메일<input
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="이메일을 입력해주세요"
          /></label>
          <label
            >닉네임<input
              name="nickname"
              required
              maxlength="50"
              placeholder="닉네임을 입력해주세요"
          /></label>
          <label
            >아이디<input
              name="username"
              autocomplete="username"
              required
              maxlength="50"
              placeholder="아이디를 입력해주세요"
          /></label>
          <label>생년월일<input name="birthDate" type="text" readonly placeholder="생년월일을 선택해주세요" /></label>
          <label
            >비밀번호<input
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
              placeholder="비밀번호를 8자 이상 입력해주세요"
          /></label>
          <button class="button primary" type="submit">회원가입하기</button>
        </form>
        <p class="auth-link">
          이미 계정이 있으신가요? <a href="/login">로그인</a>
        </p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script>
      flatpickr('input[name="birthDate"]', {
        locale: "ko",
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "Y년 m월 d일",
        maxDate: "today",
        yearRange: [1930, new Date().getFullYear()],
        disableMobile: true
      });
    </script>
  </body>
</html>
