<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드 | Starlog</title>
    <link rel="stylesheet" href="/css/starlog.css" />
  </head>
  <body>
    <div class="app-shell">
      <div th:replace="~{fragments :: topbar}"></div>
      <div class="workspace">
        <div th:replace="~{fragments :: sidebar('dashboard')}"></div>
        <main class="content">
          <div class="page-title with-badge">
            <div>
              <h1 th:text="'반가워요, ' + ${user.nickname} + '님!'">
                반가워요, 별지기님!
              </h1>
              <p>오늘도 작은 실천을 별로 남겨 나만의 은하계를 넓혀보세요.</p>
            </div>
            <div class="streak">
              <small>현재 스트릭</small
              ><strong th:text="${user.currentStreak} + '일'">0일</strong>
            </div>
          </div>

          <div class="star-toast" th:if="${starEarned != null}">
            <span class="icon icon-star"></span>
            별 <strong th:text="${starEarned}">1</strong>개를 획득했어요! 오늘의
            기록이 저장됐습니다.
          </div>

          <section class="constellation-panel">
            <h2 th:text="${constellation.name} + ' 완성도'">별자리 완성도</h2>
            <div
              class="zodiac-map"
              th:style="'--count:' + ${constellation.points.size()}"
            >
              <span
                th:each="point, stat : ${constellation.points}"
                th:classappend="${stat.index < constellation.filledCount} ? 'filled'"
                th:style="'left:' + ${point.x} + '%; top:' + ${point.y} + '%'"
              ></span>
              <strong
                ><span th:text="${constellation.percent}">0</span>%<small
                  >별자리 진행률</small
                ></strong
              >
            </div>
            <div class="tags">
              <span>#일일기록</span><span>#별보상</span><span>#성장지도</span>
            </div>
          </section>

          <section class="goal-grid" th:if="${!goals.isEmpty()}">
            <article class="goal-card" th:each="goal : ${goals}">
              <small th:text="${goal.category}">STUDY</small>
              <h3 th:text="${goal.title}">목표 이름</h3>
              <p
                th:text="${goal.description != null && !goal.description.isBlank() ? goal.description : '아직 상세 기록이 없습니다.'}"
              >
                목표 설명
              </p>
              <meter
                min="0"
                max="100"
                th:value="${goal.progressPercent}"
              ></meter>
              <span th:text="${goal.progressPercent} + '% 진행'">0% 진행</span>
            </article>
          </section>
          <section class="empty-state" th:if="${goals.isEmpty()}">
            <span class="icon icon-rocket"></span>
            <h2>아직 등록된 목표가 없어요</h2>
            <p>
              첫 목표를 만들면 대시보드에서 진행률과 별자리 성장을 함께 확인할
              수 있어요.
            </p>
            <a class="button primary" href="/goals">목표 만들기</a>
          </section>
          <a class="floating-button" href="/record"
            ><span class="icon icon-plus"></span> 기록 추가하기</a
          >
        </main>
      </div>
      <div th:replace="~{fragments :: footer}"></div>
    </div>
  </body>
</html>
